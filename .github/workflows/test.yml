name: CircuitMentor — Backend Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent runs on the same branch — cancel in-progress run if a
# newer commit is pushed before the current run finishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Run Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    # ── Environment ─────────────────────────────────────────────────────────
    env:
      # Tests import from backend/ — keep secrets out of .env for CI
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2:    ${{ secrets.GROQ_API_KEY_2 }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      # Prevent the groq_llm module from making real API calls during tests.
      # Tests that need LLM responses use mocks or the local circuit engine.
      CIRCUIT_MENTOR_CI: "1"

    defaults:
      run:
        working-directory: backend   # all commands run from /backend

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # ── 4. Run the full test suite ───────────────────────────────────────
      #
      #   --tb=short      — concise traceback on failure
      #   -v              — verbose (shows each test name)
      #   --cov           — collect coverage data
      #   --cov-report    — terminal summary + xml for upload
      #   -x              — stop on FIRST failure (fast-fail)
      #
      - name: Run pytest
        id: run-pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -x \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      # ── 5. Upload coverage report ────────────────────────────────────────
      - name: Upload coverage report
        if: always()   # upload even if tests fail so you can inspect
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

      # ── 6. Annotate PR with test summary ────────────────────────────────
      - name: Test summary
        if: always()
        run: |
          echo "### 🧪 CircuitMentor Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-pytest.outcome }}" = "success" ]; then
            echo "✅ **All 20 tests passed** — deployment unblocked." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **One or more tests failed** — deployment is BLOCKED." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the \`Run pytest\` step above for the failing test and traceback." >> $GITHUB_STEP_SUMMARY
          fi
